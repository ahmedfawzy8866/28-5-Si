name: CI

# Integration gate for the Sierra AI monorepo.
# Builds the Next.js frontend (frontend-vercel) and installs the
# Firebase Cloud Functions (firebase-backend/functions) so drift between
# the two surfaces fails fast. firebase-backend is never deployed here.

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend-vercel (install + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-vercel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-vercel/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        # Placeholder NEXT_PUBLIC_* values let `next build` complete its
        # static analysis without live secrets. Real values are injected
        # by Vercel at deploy time, never committed.
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:0000000000:web:ciplaceholder"

  backend:
    name: firebase-backend/functions (install + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firebase-backend/functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: firebase-backend/functions/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint (if configured)
        run: npm run lint --if-present

      - name: Build (if configured)
        run: npm run build --if-present
